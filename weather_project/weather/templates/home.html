<!DOCTYPE html>
<html>

<head>

<title>Weather App</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body {
    transition: background 1s ease;
}

.clear-bg{
    background: linear-gradient(to top, #fceabb, #f8b500);
}

.cloud-bg{
    background: linear-gradient(to top, #bdc3c7, #2c3e50);
}

.rain-bg{
    background: linear-gradient(to top, #4b79a1, #283e51);
}

.snow-bg{
    background: linear-gradient(to top, #e6dada, #274046);
}
</style>
</head>

<body class="
{% if weather_main == 'Clear' %}clear-bg
{% elif weather_main == 'Clouds' %}cloud-bg
{% elif weather_main == 'Rain' %}rain-bg
{% elif weather_main == 'Snow' %}snow-bg
{% else %}bg-light
{% endif %}
">

<div class="container mt-5">

<h1 class="text-center mb-4 text-dark">Weather App</h1>

<form method="GET" class="d-flex justify-content-center mb-4">

<input class="form-control w-50 me-2" type="text" name="city" placeholder="Enter city">

<button class="btn btn-primary">Search</button>

</form>


{% if error %}

<div class="alert alert-danger text-center">
{{ error }}
</div>

{% endif %}


{% if city %}

<div class="card text-center shadow p-4">

<h2>{{ city }}</h2>


<h3>{{ temperature }} °C</h3>

<p class="text-capitalize">{{ description }}</p>

</div>

{% endif %}


<div class="row mt-4">

{% for item in forecast %}

<div class="col-md-2">

<div class="card text-center p-2 shadow">

<p style="font-size:12px;">{{ item.dt_txt }}</p>

<p>{{ item.main.temp }} °C</p>

</div>

</div>

{% endfor %}

</div>


</div>



<script>

function getLocation() {

if (navigator.geolocation) {

navigator.geolocation.getCurrentPosition(showPosition);

}

}

function showPosition(position) {

let lat = position.coords.latitude;
let lon = position.coords.longitude;

window.location.href =
`/?lat=${lat}&lon=${lon}`;

}

getLocation();

</script>
</body>

</html>
